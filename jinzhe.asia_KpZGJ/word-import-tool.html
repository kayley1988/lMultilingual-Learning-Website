<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 单词导入工具 - Language Hub</title>
    <link rel="stylesheet" href="unified-theme.css">
    <style>
        body {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .import-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .file-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
        }

        .import-area {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
        }

        .file-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .file-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .file-item.selected {
            border-color: var(--maillard-brown);
            background: #fff3e0;
        }

        .file-item h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: var(--text-primary);
        }

        .file-item p {
            margin: 0;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .file-item .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        .file-item .badge.kaoyan { background: #e3f2fd; color: #1976d2; }
        .file-item .badge.cet4 { background: #e8f5e9; color: #388e3c; }
        .file-item .badge.cet6 { background: #fff3e0; color: #f57c00; }
        .file-item .badge.ielts { background: #fce4ec; color: #c2185b; }
        .file-item .badge.toefl { background: #f3e5f5; color: #7b1fa2; }
        .file-item .badge.gaozhong { background: #e0f2f1; color: #00796b; }

        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: var(--maillard-brown);
            background: #fff8f0;
        }

        .upload-area.dragover {
            border-color: var(--maillard-brown);
            background: #fff3e0;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .preview-table th,
        .preview-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .preview-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: var(--text-primary);
        }

        .preview-table tr:hover {
            background: #f8f9fa;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--maillard-brown), var(--maillard-caramel));
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            margin: 0;
            font-size: 24px;
            color: var(--maillard-brown);
        }

        .stat-card p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .column-mapping {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .mapping-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .mapping-row label {
            width: 120px;
            font-weight: 600;
        }

        .mapping-row select {
            flex: 1;
        }

        @media (max-width: 768px) {
            .import-container {
                grid-template-columns: 1fr;
            }

            .file-list {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <nav class="apple-navbar">
        <div class="apple-navbar-content">
            <a href="index.html" class="apple-navbar-brand">
                <span>🌏</span>
                <span>Language Hub</span>
            </a>
            <ul class="apple-navbar-nav">
                <li><a href="index.html" class="apple-navbar-link"><span>◧</span> 阅读助手</a></li>
                <li><a href="vocabulary.html" class="apple-navbar-link"><span>◫</span> 单词本</a></li>
                <li><a href="word-learning.html" class="apple-navbar-link"><span>◉</span> 单词学习</a></li>
                <li><a href="typing-practice.html" class="apple-navbar-link"><span>⌨️</span> 打字练习</a></li>
                <li><a href="library.html" class="apple-navbar-link"><span>📚</span> 书架</a></li>
                <li><a href="setting.html" class="apple-navbar-link"><span>◎</span> 设置</a></li>
            </ul>
        </div>
    </nav>

    <h1 style="text-align: center; color: var(--maillard-brown); margin: 20px 0;">📥 单词导入工具</h1>

    <div class="import-container">
        <div class="file-list">
            <h3 style="margin-bottom: 15px; color: var(--maillard-brown);">📋 预设单词表</h3>
            <div id="preset-files"></div>
        </div>

        <div class="import-area">
            <div class="upload-area" id="upload-area">
                <div style="font-size: 48px; margin-bottom: 15px;">📁</div>
                <h3 style="margin: 0 0 10px 0;">拖放Excel文件到此处</h3>
                <p style="margin: 0 0 15px 0; color: var(--text-secondary);">或点击选择文件</p>
                <input type="file" id="file-input" accept=".xls,.xlsx" style="display: none;">
                <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">选择文件</button>
            </div>

            <div id="import-content" style="display: none;">
                <div class="stats">
                    <div class="stat-card">
                        <h3 id="stat-total">0</h3>
                        <p>总单词数</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="stat-new">0</h3>
                        <p>新单词</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="stat-duplicate">0</h3>
                        <p>重复单词</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="stat-imported">0</h3>
                        <p>已导入</p>
                    </div>
                </div>

                <div class="column-mapping" id="column-mapping">
                    <h4 style="margin-bottom: 15px;">📊 列映射</h4>
                    <div id="mapping-container"></div>
                </div>

                <div class="progress-bar" id="progress-bar" style="display: none;">
                    <div class="progress-fill" id="progress-fill">0%</div>
                </div>

                <div style="margin-bottom: 20px;">
                    <h4 style="margin-bottom: 10px;">📝 导入设置</h4>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">目标文件夹</label>
                            <select id="target-folder" class="select">
                                <option value="root">我的单词本</option>
                            </select>
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">语言</label>
                            <select id="target-language" class="select">
                                <option value="en">英语</option>
                                <option value="ja">日语</option>
                                <option value="ko">韩语</option>
                                <option value="zh">中文</option>
                            </select>
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">难度</label>
                            <select id="target-difficulty" class="select">
                                <option value="beginner">初级</option>
                                <option value="intermediate">中级</option>
                                <option value="advanced">高级</option>
                                <option value="comprehensive">综合</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="startImport()">开始导入</button>
                    <button class="btn btn-secondary" onclick="previewData()">预览数据</button>
                    <button class="btn btn-danger" onclick="cancelImport()">取消</button>
                </div>

                <div id="preview-area" style="display: none;">
                    <h4 style="margin-bottom: 10px;">👁️ 数据预览（前20条）</h4>
                    <div style="overflow-x: auto;">
                        <table class="preview-table" id="preview-table"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="config-manager.js"></script>
    <script src="vocabulary-manager.js"></script>
    <script src="error-handler.js"></script>
    <script>
        const PRESET_FILES = [
            { id: 'kaoyan-zheng', name: '考研英语词汇正序版', path: '01.kaoyan/01.考研英语词汇正序版.xls', type: 'kaoyan', count: 5500 },
            { id: 'kaoyan-luan', name: '考研英语词汇乱序版', path: '01.kaoyan/01.考研英语词汇乱序版.xls', type: 'kaoyan', count: 5500 },
            { id: 'cet4-zheng', name: '大学英语四级词汇顺序版', path: '02.siji/大学英语四级词汇完整版带音标-顺序版.xls', type: 'cet4', count: 4500 },
            { id: 'cet4-luan', name: '大学英语四级词汇乱序版', path: '02.siji/大学英语四级词汇完整版带音标-乱序版.xls', type: 'cet4', count: 4500 },
            { id: 'cet6-zheng', name: '大学英语六级词汇顺序版', path: '03.liji/大学英语六级词汇完整版带音标-顺序版.xls', type: 'cet6', count: 5500 },
            { id: 'cet6-luan', name: '大学英语六级词汇乱序版', path: '03.liji/大学英语六级词汇完整版带音标-乱序版.xls', type: 'cet6', count: 5500 },
            { id: 'gaozhong', name: '高考英语考纲3500词汇', path: '05.gaozhong/4.【简易3935行】新课标高考英语考纲3500词汇表（英汉+词性+音标，Excel可编辑打印）  .xls', type: 'gaozhong', count: 3500 },
            { id: 'ielts-8000-zheng', name: '雅思词汇8000词顺序版', path: '06.ielts/雅思词汇8000词EXCEL版-顺序版.xls', type: 'ielts', count: 8000 },
            { id: 'ielts-8000-luan', name: '雅思词汇8000词乱序版', path: '06.ielts/雅思词汇8000词EXCEL词-乱序版.xls', type: 'ielts', count: 8000 },
            { id: 'ielts-9400-zheng', name: '雅思词汇9400词顺序版', path: '06.ielts/雅思词汇9400词EXCEL版-顺序版.xls', type: 'ielts', count: 9400 },
            { id: 'ielts-9400-luan', name: '雅思词汇9400词乱序版', path: '06.ielts/雅思词汇9400词EXCEL词-乱序版.xls', type: 'ielts', count: 9400 },
            { id: 'coca-20000', name: 'COCA 20000词频表', path: 'COCA20000词汇音标版.xlsx', type: 'toefl', count: 20000 }
        ];

        let currentFile = null;
        let excelData = null;
        let columnHeaders = [];
        let selectedPresetFile = null;

        function initialize() {
            renderPresetFiles();
            setupDragAndDrop();
            loadFolders();
        }

        function renderPresetFiles() {
            const container = document.getElementById('preset-files');
            container.innerHTML = PRESET_FILES.map(file => `
                <div class="file-item" onclick="selectPresetFile('${file.id}')">
                    <h4>${file.name} <span class="badge ${file.type}">${file.type.toUpperCase()}</span></h4>
                    <p>📊 ${file.count} 个单词</p>
                </div>
            `).join('');
        }

        function selectPresetFile(fileId) {
            const file = PRESET_FILES.find(f => f.id === fileId);
            if (!file) return;

            selectedPresetFile = file;
            document.querySelectorAll('.file-item').forEach(item => item.classList.remove('selected'));
            event.currentTarget.classList.add('selected');

            loadExcelFile(file.path);
        }

        function setupDragAndDrop() {
            const uploadArea = document.getElementById('upload-area');
            const fileInput = document.getElementById('file-input');

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileSelect(files[0]);
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileSelect(e.target.files[0]);
                }
            });
        }

        function handleFileSelect(file) {
            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                processWorkbook(workbook, file.name);
            };
            reader.readAsArrayBuffer(file);
        }

        async function loadExcelFile(path) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error('文件加载失败');
                const data = await response.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                processWorkbook(workbook, selectedPresetFile.name);
            } catch (error) {
                UIManager.showToast('文件加载失败: ' + error.message, 'error');
                console.error('加载Excel文件失败:', error);
            }
        }

        function processWorkbook(workbook, fileName) {
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            excelData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            if (excelData.length === 0) {
                UIManager.showToast('Excel文件为空', 'error');
                return;
            }

            columnHeaders = excelData[0];
            excelData = excelData.slice(1);

            document.getElementById('upload-area').style.display = 'none';
            document.getElementById('import-content').style.display = 'block';

            updateStats();
            renderColumnMapping();
        }

        function updateStats() {
            const total = excelData.length;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-new').textContent = total;
            document.getElementById('stat-duplicate').textContent = 0;
            document.getElementById('stat-imported').textContent = 0;
        }

        function renderColumnMapping() {
            const container = document.getElementById('mapping-container');
            const mappings = [
                { label: '单词列', key: 'word' },
                { label: '音标列', key: 'pronunciation' },
                { label: '翻译列', key: 'translation' },
                { label: '词性列', key: 'pos' }
            ];

            container.innerHTML = mappings.map(mapping => `
                <div class="mapping-row">
                    <label>${mapping.label}</label>
                    <select id="map-${mapping.key}" class="select">
                        <option value="">-- 不选择 --</option>
                        ${columnHeaders.map((header, index) => `
                            <option value="${index}" ${autoSelectColumn(mapping.key, header) ? 'selected' : ''}>${header}</option>
                        `).join('')}
                    </select>
                </div>
            `).join('');
        }

        function autoSelectColumn(key, header) {
            const headerLower = String(header).toLowerCase();
            switch (key) {
                case 'word':
                    return headerLower.includes('word') || headerLower.includes('单词') || headerLower.includes('词汇');
                case 'pronunciation':
                    return headerLower.includes('pronunciation') || headerLower.includes('音标') || headerLower.includes('ipa');
                case 'translation':
                    return headerLower.includes('translation') || headerLower.includes('翻译') || headerLower.includes('中文');
                case 'pos':
                    return headerLower.includes('pos') || headerLower.includes('词性');
                default:
                    return false;
            }
        }

        function previewData() {
            const wordCol = document.getElementById('map-word').value;
            const pronunciationCol = document.getElementById('map-pronunciation').value;
            const translationCol = document.getElementById('map-translation').value;
            const posCol = document.getElementById('map-pos').value;

            if (!wordCol) {
                UIManager.showToast('请选择单词列', 'error');
                return;
            }

            const previewData = excelData.slice(0, 20).map(row => ({
                word: row[wordCol],
                pronunciation: pronunciationCol ? row[pronunciationCol] : '',
                translation: translationCol ? row[translationCol] : '',
                pos: posCol ? row[posCol] : ''
            }));

            const table = document.getElementById('preview-table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>单词</th>
                        <th>音标</th>
                        <th>翻译</th>
                        <th>词性</th>
                    </tr>
                </thead>
                <tbody>
                    ${previewData.map(row => `
                        <tr>
                            <td>${row.word || ''}</td>
                            <td>${row.pronunciation || ''}</td>
                            <td>${row.translation || ''}</td>
                            <td>${row.pos || ''}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;

            document.getElementById('preview-area').style.display = 'block';
        }

        async function startImport() {
            const wordCol = document.getElementById('map-word').value;
            const pronunciationCol = document.getElementById('map-pronunciation').value;
            const translationCol = document.getElementById('map-translation').value;
            const posCol = document.getElementById('map-pos').value;
            const targetFolder = document.getElementById('target-folder').value;
            const targetLanguage = document.getElementById('target-language').value;
            const targetDifficulty = document.getElementById('target-difficulty').value;

            if (!wordCol) {
                UIManager.showToast('请选择单词列', 'error');
                return;
            }

            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            progressBar.style.display = 'block';

            let imported = 0;
            let duplicate = 0;

            for (let i = 0; i < excelData.length; i++) {
                const row = excelData[i];
                const word = row[wordCol];

                if (!word) continue;

                const wordData = {
                    word: word,
                    pronunciation: pronunciationCol ? row[pronunciationCol] : '',
                    translation: translationCol ? row[translationCol] : '',
                    pos: posCol ? row[posCol] : '',
                    language: targetLanguage,
                    difficulty: targetDifficulty,
                    source: selectedPresetFile ? selectedPresetFile.name : currentFile.name
                };

                const existingWord = VocabularyManager.vocabulary.find(
                    w => w.word === wordData.word && w.language === wordData.language
                );

                if (existingWord) {
                    duplicate++;
                } else {
                    VocabularyManager.addWord(wordData);
                    imported++;
                }

                const progress = Math.round(((i + 1) / excelData.length) * 100);
                progressFill.style.width = progress + '%';
                progressFill.textContent = progress + '%';

                if (i % 100 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }

            document.getElementById('stat-imported').textContent = imported;
            document.getElementById('stat-duplicate').textContent = duplicate;

            UIManager.showToast(`导入完成！成功导入 ${imported} 个单词，重复 ${duplicate} 个`, 'success');
        }

        function cancelImport() {
            currentFile = null;
            excelData = null;
            columnHeaders = [];
            selectedPresetFile = null;

            document.getElementById('upload-area').style.display = 'block';
            document.getElementById('import-content').style.display = 'none';
            document.getElementById('preview-area').style.display = 'none';
            document.getElementById('progress-bar').style.display = 'none';

            document.querySelectorAll('.file-item').forEach(item => item.classList.remove('selected'));
        }

        function loadFolders() {
            const folders = VocabularyManager.folderStructure.folders;
            const select = document.getElementById('target-folder');
            select.innerHTML = folders.map(folder => `
                <option value="${folder.id}">${'　'.repeat(folder.id.split('-').length - 1)}${folder.name}</option>
            `).join('');
        }

        initialize();
    </script>
</body>
</html>
