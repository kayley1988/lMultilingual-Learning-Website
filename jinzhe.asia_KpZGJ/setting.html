<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - Language Hub</title>
    <link rel="stylesheet" href="unified-theme.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5ebe0 0%, #e3d5ca 100%);
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ==================== 导航栏 ==================== */
        .navbar {
            background: rgba(255, 255, 255, 0.8);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(139, 111, 71, 0.15);
            box-shadow: 0 2px 8px rgba(61, 46, 31, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0;
            margin-bottom: 24px;
            border-radius: 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            color: #3d2e1f;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .brand-icon {
            font-size: 24px;
        }

        .nav-menu {
            display: flex;
            gap: 6px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 10px;
            text-decoration: none;
            color: #6B5344;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease;
            background: transparent;
        }

        .nav-link:hover {
            background: rgba(139, 111, 71, 0.08);
            color: #3d2e1f;
        }

        .nav-link.active {
            background: #8B6F47;
            color: white;
            box-shadow: 0 2px 8px rgba(139, 111, 71, 0.3);
        }

        .nav-link span {
            font-size: 18px;
            font-weight: 400;
            opacity: 0.9;
        }

        /* ==================== 设置容器 ==================== */
        .settings-container {
            background: transparent;
            padding: 0;
        }

        .settings-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .settings-header h2 {
            font-size: 32px;
            color: #3d2e1f;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .settings-header p {
            color: #6B5344;
            font-size: 16px;
        }

        /* ==================== 设置区块 ==================== */
        .settings-section {
            background: rgba(255, 255, 255, 0.7);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            padding: 28px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 16px rgba(61, 46, 31, 0.1);
            margin-bottom: 24px;
        }

        .settings-section h3 {
            color: #3d2e1f;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #3d2e1f;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.9);
            color: #3d2e1f;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--maillard-brown);
            box-shadow: 0 0 0 3px rgba(139, 111, 71, 0.15);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .help-text {
            font-size: 13px;
            color: #6B5344;
            margin-top: 5px;
        }

        /* ==================== 按钮 ==================== */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B6F47, #A87C5C);
            color: white;
            box-shadow: 0 4px 12px rgba(139, 111, 71, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 111, 71, 0.4);
        }

        .btn-secondary {
            background: rgba(139, 111, 71, 0.08);
            color: #6B5344;
            border: 1px solid rgba(139, 111, 71, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(139, 111, 71, 0.15);
        }

        .btn-danger {
            background: #D4A574;
            color: white;
        }

        .btn-danger:hover {
            background: #C9944F;
        }

        /* ==================== 警告框 ==================== */
        .alert {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            border: 1px solid transparent;
        }

        .alert-warning {
            background: rgba(212, 165, 116, 0.1);
            border-color: rgba(212, 165, 116, 0.3);
            color: #A87C5C;
        }

        .alert-info {
            background: rgba(139, 111, 71, 0.1);
            border-color: rgba(139, 111, 71, 0.2);
            color: #6B5344;
        }

        /* ==================== 保存按钮容器 ==================== */
        .save-container {
            text-align: center;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid rgba(139, 111, 71, 0.15);
        }

        .save-container .btn-primary {
            padding: 14px 40px;
            font-size: 16px;
        }

        /* 必填标记 */
        .required {
            color: #D4A574;
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 768px) {
            .settings-container {
                padding: 25px;
            }

            .nav-container {
                flex-direction: column;
                gap: 15px;
            }

            .nav-menu {
                justify-content: center;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-icon">🌍</span>
                <span class="brand-text">Language Hub</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">
                    <span>◧</span> 阅读助手
                </a>
                <a href="vocabulary.html" class="nav-link">
                    <span>◫</span> 单词本
                </a>
                <a href="word-learning.html" class="nav-link">
                    <span>◉</span> 单词学习
                </a>
                <a href="setting.html" class="nav-link active">
                    <span>◎</span> 设置
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container">
        <div class="settings-container">
            <div class="settings-header">
                <h2>⚙️ 设置中心</h2>
                <p>配置您的个性化学习体验</p>
            </div>

            <!-- API 配置（保留） -->
            <div class="settings-section">
                <h3>🔑 AI API 配置</h3>
                
                <div class="form-group">
                    <label class="form-label">API 提供商</label>
                    <select class="form-select" id="apiProvider">
                        <option value="deepseek">DeepSeek (推荐)</option>
                        <option value="qwen">通义千问 (Qwen)</option>
                        <option value="openai">OpenAI (GPT-4)</option>
                        <option value="claude">Claude (Anthropic)</option>
                        <option value="gemini">Google Gemini</option>
                    </select>
                    <div class="help-text">选择您要使用的AI服务提供商</div>
                </div>

                <div class="form-group">
                    <label class="form-label">API 密钥 <span class="required">*</span></label>
                    <input type="password" class="form-input" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
                    <div class="help-text">密钥仅保存在本地浏览器，不会上传服务器。DeepSeek/千问可在官网获取。</div>
                </div>

                <div class="form-group">
                    <label class="form-label">API 基础地址（可选）</label>
                    <input type="text" class="form-input" id="apiBaseUrl" placeholder="https://api.deepseek.com/v1">
                    <div class="help-text">使用代理或自定义端点时填写，一般留空即可</div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="testAPI()">
                        🔌 测试连接
                    </button>
                    <button class="btn btn-secondary" onclick="clearAPIKey()">
                        🗑️ 清除密钥
                    </button>
                </div>

                <div class="alert alert-warning">
                    <span>⚠️</span>
                    <div>
                        <strong>API使用提示：</strong>
                        <ul style="margin: 8px 0 0 0; padding-left: 20px;">
                            <li>DeepSeek：免费版每分钟10次请求，延迟建议1000ms+</li>
                            <li>通义千问：需阿里云API Key，支持Qwen-Plus/Turbo</li>
                            <li>批量翻译时建议使用DeepSeek或千问，成本更低</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 数据管理（保留） -->
            <div class="settings-section">
                <h3>💾 数据管理</h3>
                
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="exportSettings()">
                        📤 导出配置
                    </button>
                    <button class="btn btn-secondary" onclick="importSettings()">
                        📥 导入配置
                    </button>
                    <button class="btn btn-danger" onclick="resetSettings()">
                        🔄 重置所有设置
                    </button>
                </div>
            </div>

            <!-- 保存按钮 -->
            <div class="save-container">
                <button class="btn btn-primary" onclick="saveSettings()">
                    💾 保存设置
                </button>
            </div>
        </div>
    </div>

    <script>
        /* ==================== 设置管理 ==================== */

        // 加载设置
        function loadSettings() {
            const settings = localStorage.getItem('languageHubSettings');
            return settings ? JSON.parse(settings) : {
                api: { provider: 'deepseek', key: '', baseUrl: '' },
                default: { delay: 500 }
            };
        }

        // 保存设置
        function saveSettings() {
            const settings = {
                api: {
                    provider: document.getElementById('apiProvider').value,
                    key: document.getElementById('apiKey').value,
                    baseUrl: document.getElementById('apiBaseUrl').value
                },
                default: {
                    delay: 500 // 使用默认值
                }
            };

            localStorage.setItem('languageHubSettings', JSON.stringify(settings));
            
            // 显示成功提示
            showNotification('✅ 设置已保存！', 'success');
        }

        // 测试API连接
        async function testAPI() {
            const provider = document.getElementById('apiProvider').value;
            const key = document.getElementById('apiKey').value;
            
            if (!key) {
                showNotification('⚠️ 请先输入API密钥', 'warning');
                return;
            }

            const testBtn = event.target;
            const originalText = testBtn.innerHTML;
            testBtn.innerHTML = '🔌 测试中...';
            testBtn.disabled = true;

            try {
                let endpoint = '';
                let body = {};
                let headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${key}`
                };

                switch(provider) {
                    case 'deepseek':
                        endpoint = 'https://api.deepseek.com/v1/chat/completions';
                        body = {
                            model: 'deepseek-chat',
                            messages: [{ role: 'user', content: 'Hello' }],
                            max_tokens: 5
                        };
                        break;
                    case 'openai':
                        endpoint = 'https://api.openai.com/v1/chat/completions';
                        body = {
                            model: 'gpt-3.5-turbo',
                            messages: [{ role: 'user', content: 'Hello' }],
                            max_tokens: 5
                        };
                        break;
                    case 'claude':
                        endpoint = 'https://api.anthropic.com/v1/messages';
                        body = {
                            model: 'claude-3-sonnet-20240229',
                            max_tokens: 5,
                            messages: [{ role: 'user', content: 'Hello' }]
                        };
                        break;
                    case 'gemini':
                        endpoint = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent';
                        body = {
                            contents: [{ parts: [{ text: 'Hello' }] }]
                        };
                        break;
                }

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(body)
                });

                if (response.ok) {
                    showNotification('✅ API 连接成功！', 'success');
                } else {
                    const error = await response.json();
                    showNotification(`❌ 连接失败: ${error.error?.message || error.message}`, 'error');
                }
            } catch (error) {
                showNotification(`❌ 网络错误: ${error.message}`, 'error');
            } finally {
                testBtn.innerHTML = originalText;
                testBtn.disabled = false;
            }
        }

        // 清除API密钥
        function clearAPIKey() {
            if (confirm('确定要清除已保存的API密钥吗？')) {
                document.getElementById('apiKey').value = '';
                saveSettings();
                showNotification('🗑️ API密钥已清除', 'info');
            }
        }

        // 导出设置
        function exportSettings() {
            const settings = loadSettings();
            const dataStr = JSON.stringify(settings, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = 'language-hub-settings.json';
            link.click();
            
            showNotification('📤 配置已导出', 'success');
        }

        // 导入设置
        function importSettings() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const settings = JSON.parse(event.target.result);
                        localStorage.setItem('languageHubSettings', JSON.stringify(settings));
                        loadFormValues();
                        showNotification('📥 配置已导入', 'success');
                    } catch (error) {
                        showNotification('❌ 配置文件格式错误', 'error');
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }

        // 重置所有设置
        function resetSettings() {
            if (confirm('⚠️ 确定要重置所有设置吗？这将清除API密钥和所有配置。')) {
                localStorage.removeItem('languageHubSettings');
                loadFormValues();
                showNotification('🔄 设置已重置', 'info');
            }
        }

        // 加载表单值
        function loadFormValues() {
            const settings = loadSettings();
            
            // API设置
            document.getElementById('apiProvider').value = settings.api?.provider || 'deepseek';
            document.getElementById('apiKey').value = settings.api?.key || '';
            document.getElementById('apiBaseUrl').value = settings.api?.baseUrl || '';
        }

        // 显示通知
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 16px 24px;
                border-radius: 12px;
                font-weight: 600;
                z-index: 10000;
                animation: slideIn 0.3s ease;
                display: flex;
                align-items: center;
                gap: 12px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            `;
            
            const colors = {
                success: '#8B6F47',  // 焦糖棕
                error: '#A87C5C',    // 焦糖色
                warning: '#D4A574',  // 烤面包色
                info: '#B89968'      // 拿铁棕
            };
            
            notification.style.background = colors[type] || colors.info;
            notification.style.color = 'white';
            
            // 添加图标
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: '💡'
            };
            
            notification.innerHTML = `${icons[type] || '💡'} ${message}`;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(400px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(400px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            loadFormValues();
        });
    </script>
</body>
</html>
