<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⌨️ 智能打字练习 - Language Hub</title>
    <link rel="stylesheet" href="unified-theme.css">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif !important;
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5ebe0 0%, #e3d5ca 100%);
        }

        .typing-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 顶部控制面板 */
        .control-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(61, 46, 31, 0.1);
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 10px 20px;
            background: #fff;
            border: 2px solid var(--maillard-cream);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: var(--maillard-brown);
            color: white;
            border-color: var(--maillard-brown);
        }

        .mode-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 111, 71, 0.2);
        }

        .difficulty-selector {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .difficulty-btn {
            padding: 8px 16px;
            background: var(--maillard-cream);
            border: 2px solid var(--maillard-cream);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: var(--maillard-brown);
            color: white;
            border-color: var(--maillard-brown);
        }

        /* 主练习区 */
        .practice-area {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(61, 46, 31, 0.1);
            min-height: 400px;
        }

        .text-display {
            font-size: 24px;
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 30px;
            user-select: none;
        }

        .word {
            display: inline-block;
            margin: 4px;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .word.current {
            background: rgba(139, 111, 71, 0.1);
            box-shadow: 0 0 0 2px var(--maillard-brown);
        }

        .word.correct {
            color: #4caf50;
        }

        .word.error {
            color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }

        .char {
            position: relative;
        }

        .char.correct {
            color: #4caf50;
        }

        .char.error {
            color: #f44336;
            text-decoration: underline wavy #f44336;
        }

        .char.cursor {
            border-left: 2px solid var(--maillard-brown);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .typing-input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: 2px solid var(--maillard-cream);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }

        .typing-input:focus {
            border-color: var(--maillard-brown);
            box-shadow: 0 0 0 4px rgba(139, 111, 71, 0.1);
        }

        /* 手写板样式 */
        .handwriting-container {
            display: none;
            margin-top: 20px;
        }

        .handwriting-container.active {
            display: block;
        }

        .handwriting-canvas {
            width: 100%;
            height: 200px;
            border: 2px solid var(--maillard-brown);
            border-radius: 12px;
            background: white;
            cursor: crosshair;
            touch-action: none;
        }

        .handwriting-controls {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            justify-content: center;
        }

        /* 统计面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(61, 46, 31, 0.08);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--maillard-brown);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* 进度条 */
        .progress-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(61, 46, 31, 0.08);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--maillard-cream);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--maillard-brown) 0%, var(--maillard-caramel) 100%);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            text-align: center;
        }

        /* 成就系统 */
        .achievements-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(61, 46, 31, 0.08);
        }

        .achievement-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--maillard-cream);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .achievement-item.unlocked {
            background: linear-gradient(135deg, var(--maillard-brown) 0%, var(--maillard-caramel) 100%);
            color: white;
        }

        .achievement-icon {
            font-size: 24px;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .achievement-desc {
            font-size: 12px;
            opacity: 0.8;
        }

        /* 错误分析 */
        .error-analysis {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 16px rgba(61, 46, 31, 0.08);
        }

        .error-word {
            display: inline-block;
            margin: 4px;
            padding: 6px 12px;
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 8px;
            font-size: 14px;
            color: #f44336;
            cursor: pointer;
            transition: all 0.3s;
        }

        .error-word:hover {
            background: rgba(244, 67, 54, 0.2);
            transform: translateY(-2px);
        }

        /* 按钮组 */
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .action-btn {
            padding: 12px 24px;
            background: #8B6F47;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(139, 111, 71, 0.3);
        }

        .action-btn:hover {
            background: #A87C5C;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 111, 71, 0.4);
        }

        .action-btn.secondary {
            background: #e3d5ca;
            color: #6B5344;
        }

        .action-btn.secondary:hover {
            background: #d4c5b0;
        }

        /* 结果卡片 */
        .result-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(61, 46, 31, 0.15);
        }

        .result-title {
            font-size: 32px;
            font-weight: 700;
            color: #8B6F47;
            margin-bottom: 20px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .typing-container {
                padding: 12px;
            }

            .text-display {
                font-size: 18px;
            }

            .stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="apple-navbar">
        <div class="apple-navbar-content">
            <a href="index.html" class="apple-navbar-brand">
                <span>🌏</span>
                <span>Language Hub</span>
            </a>
            <ul class="apple-navbar-nav">
                <li><a href="index.html" class="apple-navbar-link"><span>◧</span> 阅读助手</a></li>
                <li><a href="vocabulary.html" class="apple-navbar-link"><span>◫</span> 单词本</a></li>
                <li><a href="word-learning.html" class="apple-navbar-link"><span>◉</span> 单词学习</a></li>
                <li><a href="library.html" class="apple-navbar-link"><span>📚</span> 书架</a></li>
                <li><a href="setting.html" class="apple-navbar-link"><span>◎</span> 设置</a></li>
            </ul>
        </div>
    </nav>

    <div class="typing-container">
        <!-- 控制面板 -->
        <div class="control-panel">
            <h2 style="margin: 0 0 20px 0; color: #3d2e1f;">⌨️ 智能打字练习</h2>
            
            <!-- 模式选择 -->
            <div style="margin-bottom: 16px;">
                <label style="font-weight: 600; color: #6B5344; margin-bottom: 8px; display: block;">练习模式：</label>
                <div class="mode-selector">
                    <button class="mode-btn active" onclick="setMode('book')">📖 书架文章</button>
                </div>
            </div>

            <!-- 书架选择器 -->
            <div id="bookSelector" style="margin-bottom: 16px;">
                <label style="font-weight: 600; color: #6B5344; margin-bottom: 8px; display: block;">选择书籍：</label>
                <select id="bookSelect" style="width: 100%; padding: 10px; border-radius: 12px; border: 2px solid var(--maillard-cream); font-size: 14px; background: white;">
                    <option value="">请选择一本书...</option>
                </select>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progressText">准备开始...</div>
        </div>
        
        <!-- 分页控件 -->
        <div class="pagination-controls" id="paginationControls" style="display: none; margin: 20px 0; text-align: center;">
            <button class="btn btn-secondary" onclick="previousPage()" id="prevPageBtn">⏮️ 上一页</button>
            <span style="margin: 0 16px; font-weight: 600; color: var(--text-secondary);">第 <span id="currentPageNum">1</span> 页 / 共 <span id="totalPagesNum">1</span> 页</span>
            <button class="btn btn-secondary" onclick="nextPage()" id="nextPageBtn">下一页 ⏭️</button>
        </div>

        <!-- 统计面板 -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="wpmValue">0</div>
                <div class="stat-label">每分钟字数 (WPM)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracyValue">100%</div>
                <div class="stat-label">准确率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="errorCountValue">0</div>
                <div class="stat-label">错误次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timeValue">0s</div>
                <div class="stat-label">用时</div>
            </div>
        </div>

        <!-- 字体设置 -->
        <div class="font-settings" style="margin: 20px 0; padding: 16px; background: rgba(255,255,255,0.8); border-radius: 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 16px;">
            <label style="font-weight: 600; color: #6B5344;">字体大小：</label>
            <input type="range" id="fontSizeSlider" min="14" max="32" value="18" style="width: 200px;" oninput="changeFontSize(this.value)">
            <span id="fontSizeValue" style="color: #8B6F47; min-width: 40px;">18px</span>
            
            <label style="font-weight: 600; color: #6B5344; margin-left: 16px;">字体：</label>
            <select id="fontFamilySelect" onchange="changeFontFamily(this.value)" style="padding: 6px 12px; border-radius: 8px; border: 2px solid var(--maillard-cream); background: white; color: #6B5344; cursor: pointer;">
                <option value="Arial, sans-serif">Arial</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="Times New Roman, serif">Times New Roman</option>
                <option value="Courier New, monospace">Courier New</option>
                <option value="Verdana, sans-serif">Verdana</option>
            </select>
        </div>
        
        <!-- 练习区域 -->
        <div class="practice-area" id="practiceArea">
            <div class="text-display" id="textDisplay" style="line-height: 2; font-size: 18px; text-align: justify;">
                点击"开始练习"按钮开始...
            </div>
            
            <!-- 键盘输入 -->
            <input type="text" 
                   class="typing-input" 
                   id="typingInput" 
                   placeholder="在这里输入..." 
                   disabled
                   autocomplete="off"
                   spellcheck="false">
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
            <button class="btn btn-primary" id="startBtn" onclick="startPractice()">▶️ 开始练习</button>
            <button class="btn btn-secondary" onclick="resetPractice()">🔄 重新开始</button>
            <button class="btn btn-secondary" onclick="skipCurrent()">⏭️ 跳过当前</button>
        </div>

        <!-- 错误分析 -->
        <div class="error-analysis" id="errorAnalysis" style="display: none;">
            <h3 style="margin-top: 0; color: #3d2e1f;">📊 错误分析</h3>
            <p style="color: #6B5344; margin-bottom: 12px;">点击单词可加入生词本</p>
            <div id="errorWordsList"></div>
        </div>

        <!-- 成就面板 -->
        <div class="achievements-panel" style="margin-top: 20px;">
            <h3 style="margin-top: 0; color: #3d2e1f;">🏆 成就系统</h3>
            <div id="achievementsList"></div>
        </div>
    </div>

    <script src="preset-word-lists.js"></script>
    <script src="preset-books.js"></script>
    <script src="vocabulary.js"></script>
    <script>
        // ==================== 配置 ====================
        const API_BASE_URL = 'http://localhost:3000/api';
        const CURRENT_USER_ID = 'default_user'; // 可以从登录系统获取

        // ==================== 全局变量 ====================
        let currentMode = 'vocabulary';
        let currentText = '';
        let currentWords = [];
        let currentWordIndex = 0;
        let currentCharIndex = 0;
        let startTime = null;
        let errors = 0;
        let totalChars = 0;
        let errorWords = new Set();
        let isStarted = false;
        let practiceStats = {
            totalSessions: 0,
            totalWords: 0,
            totalChars: 0,
            totalErrors: 0,
            bestWPM: 0,
            bestAccuracy: 0
        };
        
        // 分页相关变量
        let wordsPerPage = 100; // 每页显示 100 个单词
        let totalPages = 1;

        // 成就列表
        const achievements = [
            { id: 'first_session', name: '初次尝试', desc: '完成第一次练习', icon: '🎯', unlocked: false },
            { id: 'speed_50', name: '速度之星', desc: 'WPM达到50', icon: '⚡', unlocked: false },
            { id: 'speed_80', name: '打字高手', desc: 'WPM达到80', icon: '🚀', unlocked: false },
            { id: 'accuracy_95', name: '精准射手', desc: '准确率达到95%', icon: '🎯', unlocked: false },
            { id: 'accuracy_99', name: '完美主义', desc: '准确率达到99%', icon: '💎', unlocked: false },
            { id: 'practice_10', name: '勤奋学习', desc: '完成10次练习', icon: '📚', unlocked: false },
            { id: 'practice_50', name: '持之以恒', desc: '完成50次练习', icon: '🏅', unlocked: false },
            { id: 'words_1000', name: '千字达人', desc: '累计打字1000词', icon: '🌟', unlocked: false }
        ];

        // ==================== 练习内容库 ====================
        const contentLibrary = {
            word: {
                easy: ['cat', 'dog', 'book', 'pen', 'cup', 'hat', 'sun', 'moon', 'star', 'tree', 'bird', 'fish', 'door', 'window', 'chair'],
                medium: ['apple', 'banana', 'orange', 'computer', 'keyboard', 'monitor', 'internet', 'website', 'programming', 'language'],
                hard: ['environment', 'development', 'technology', 'application', 'communication', 'organization', 'intelligence', 'infrastructure'],
                expert: ['entrepreneurship', 'sustainability', 'cryptocurrency', 'pharmaceutical', 'interdisciplinary', 'comprehensiveness']
            },
            sentence: {
                easy: [
                    'The cat is sleeping.',
                    'I like reading books.',
                    'The sun is bright today.',
                    'She drinks a cup of tea.',
                    'They play in the park.'
                ],
                medium: [
                    'Learning new skills takes time and practice.',
                    'Technology has changed the way we communicate.',
                    'Reading helps improve your vocabulary and understanding.',
                    'Regular exercise is important for good health.'
                ],
                hard: [
                    'The advancement of artificial intelligence has revolutionized many industries.',
                    'Climate change poses significant challenges to global sustainability efforts.',
                    'Effective communication requires both listening and speaking skills.'
                ],
                expert: [
                    'The interdisciplinary approach to solving complex problems has become increasingly important in modern research.',
                    'Globalization has created unprecedented opportunities for international collaboration and cultural exchange.'
                ]
            },
            paragraph: {
                easy: 'Learning to type quickly and accurately is an important skill in today\'s digital world. With practice, anyone can improve their typing speed and reduce errors. Start slowly and focus on accuracy first, then gradually increase your speed.',
                medium: 'Touch typing is a method of typing without looking at the keyboard. It involves placing your fingers on the home row keys and using muscle memory to find other keys. This technique can significantly improve your typing speed and efficiency once mastered.',
                hard: 'The development of digital technology has fundamentally transformed how we work, communicate, and access information. From artificial intelligence to cloud computing, technological innovations continue to reshape industries and create new opportunities for growth and development.',
                expert: 'Interdisciplinary collaboration has become increasingly crucial in addressing complex global challenges. By integrating perspectives from diverse fields such as technology, social sciences, and environmental studies, researchers can develop more comprehensive and innovative solutions to pressing issues facing humanity.'
            }
        };

        // ==================== 初始化 ====================
        window.onload = async function() {
            await loadStatsFromDB();
            await loadAchievementsFromDB();
            renderAchievements();
            await loadBooksFromLibrary(); // 加载书架书籍
            
            // 从 localStorage 加载词汇（作为备选）
            if (window.vocabularyManager) {
                console.log('词汇管理器已加载');
            }
        };

        // ==================== 加载书架书籍 ====================
        async function loadBooksFromLibrary() {
            try {
                // 从书架页面保存的数据中读取
                let books = JSON.parse(localStorage.getItem('libraryBooks') || '[]');
                const select = document.getElementById('bookSelect');
                
                if (!select) {
                    console.warn('未找到书籍选择下拉框');
                    return;
                }
                
                // 清空现有选项
                select.innerHTML = '<option value="">-- 选择书籍 --</option>';
                
                // 合并预设书籍
                let allBooks = [...books];
                
                // 添加预设书籍（从 preset-books.js）
                if (typeof PRESET_BOOKS !== 'undefined' && PRESET_BOOKS.length > 0) {
                    const presetBooksWithContent = await Promise.all(
                        PRESET_BOOKS.map(async (book) => {
                            // 尝试读取文件内容
                            let content = '';
                            try {
                                const response = await fetch(book.filePath);
                                if (response.ok) {
                                    content = await response.text();
                                    console.log(`✅ 已加载预设书籍内容: ${book.title}, 长度: ${content.length}`);
                                } else {
                                    console.warn(`⚠️ 无法加载书籍文件: ${book.filePath}`);
                                }
                            } catch (e) {
                                console.warn(`⚠️ 读取书籍失败: ${book.title}`, e);
                            }
                            return {
                                ...book,
                                content: content,
                                author: book.author || 'Unknown'
                            };
                        })
                    );
                    allBooks = [...presetBooksWithContent, ...allBooks];
                }
                
                // 如果没有书籍，添加默认书籍
                if (allBooks.length === 0) {
                    allBooks = [
                        {
                            id: 'default-1',
                            title: 'The Great Gatsby',
                            author: 'F. Scott Fitzgerald',
                            coverEmoji: '📖',
                            type: 'document',
                            content: 'In my younger and more vulnerable years my father gave me some advice that I\'ve been turning over in my mind ever since. "Whenever you feel like criticizing any one," he told me, "just remember that all the people in this world haven\'t had the advantages that you\'ve had."',
                            addedDate: new Date().toISOString()
                        },
                        {
                            id: 'default-2',
                            title: 'To Kill a Mockingbird',
                            author: 'Harper Lee',
                            coverEmoji: '📚',
                            type: 'document',
                            content: 'When he was nearly thirteen, my brother Jem got his arm badly broken at the elbow. When it healed, and Jem\'s fears of never being able to play football were assuaged, he was seldom self-conscious about his injury.',
                            addedDate: new Date().toISOString()
                        }
                    ];
                }
                
                allBooks.forEach(book => {
                    const option = document.createElement('option');
                    option.value = book.id;
                    option.textContent = `${book.title} - ${book.author}`;
                    option.dataset.content = book.content || '';
                    option.dataset.type = book.type || 'document';
                    option.dataset.filePath = book.filePath || '';
                    option.dataset.fileName = book.fileName || '';
                    select.appendChild(option);
                });

        // ==================== 生成内容 ====================
        async function generateContent() {
            // 初始化分页变量
            currentPage = 1;
            
            // 从书架获取书籍内容
            const select = document.getElementById('bookSelect');
            const selectedOption = select.selectedOptions[0];
            
            if (!select.value || !selectedOption) {
                alert('请先选择一本书！');
                currentWords = contentLibrary.word.easy.slice(0, 20);
                return;
            }
            
            const bookContent = selectedOption.dataset.content;
            if (!bookContent || bookContent.trim().length === 0) {
                alert('该书籍内容为空！');
                currentWords = contentLibrary.word.easy.slice(0, 20);
                return;
            }
            
            // 按段落分割内容
            const paragraphs = bookContent.split(/\n\n+/).filter(p => p.trim().length > 0);
            console.log('📚 书籍段落数:', paragraphs.length);
            
            // 提取所有单词（保持原文大小写）
            const allWords = bookContent.match(/\b[a-zA-Z]{2,}\b/g) || [];
            
            if (allWords.length === 0) {
                alert('该书籍没有可用的英文单词！');
                currentWords = contentLibrary.word.easy.slice(0, 20);
                return;
            }
            
            console.log('📚 书籍总单词数:', allWords.length);
            
            // 存储段落信息，用于后续渲染
            window.currentParagraphs = paragraphs;
            
            // 提取所有单词（保持原文大小写）
            currentWords = allWords;
            
            // 计算分页
            totalPages = Math.ceil(currentWords.length / wordsPerPage);
            currentPage = 1;
            updatePaginationControls();
        }

        // ==================== 从词汇本获取单词 ====================
        async function getVocabularyWords() {

                const select = document.getElementById('vocabularySelect');

                console.log('📚 getVocabularyWords - 选择的单词本 ID:', selectedFolderId);
                
                // 检查是否选择了 "word-source" 类型的文件夹
                if (selectedFolderId && selectedFolderId !== 'all') {

                    if (typeof PRESET_FOLDER_STRUCTURE !== 'undefined') {
                        const selectedFolder = PRESET_FOLDER_STRUCTURE.folders.find(f => f.id === selectedFolderId);
                        console.log('📚 查找预设文件夹:', selectedFolder);
                        
                        if (selectedFolder && selectedFolder.type === 'word-source' && selectedFolder.excelPath) {

                            console.log('📚 从 Excel 文件加载单词:', selectedFolder.name, '路径:', selectedFolder.excelPath);
                            try {
                                const words = await loadWordsFromExcel(selectedFolder.excelPath);
                                console.log('📚 加载成功，单词数量:', words.length);
                                if (words.length > 0) {
                                    return shuffleArray(words).slice(0, 20);
                                }
                            } catch (error) {
                                console.error('📚 加载 Excel 文件失败:', error);
                            }
                        }
                    }
                }
                
                // 从 localStorage 获取单词
                if (vocabulary.length === 0) {
                    console.log('📚 localStorage 中没有单词');
                    return [];
                }
                
                // 根据单词本筛选
                let filtered = vocabulary;
                if (selectedFolderId && selectedFolderId !== 'all') {
                    filtered = vocabulary.filter(item => item.parentId === selectedFolderId);
                    console.log('📚 筛选后单词数量:', filtered.length);
                }
                
                // 随机选择 20 个
                const words = filtered.map(item => item.word).filter(w => w);
                console.log('📚 最终单词数量:', words.length);
                return shuffleArray(words).slice(0, 20);
            } catch (e) {
                console.error('读取词汇失败:', e);

        // ==================== 从 Excel 文件加载单词 ====================
        async function loadWordsFromExcel(excelPath) {
            try {
                console.log('📚 loadWordsFromExcel - 路径:', excelPath);
                
                // 加载 Excel 文件
                const response = await fetch(excelPath);
                if (!response.ok) {
                    throw new Error('文件不存在：' + excelPath);
                }
                
                // 等待 XLSX 库加载
                if (typeof XLSX === 'undefined') {
                    console.log('📚 XLSX 库未加载，正在加载...');
                    await new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    });
                    console.log('📚 XLSX 库已加载');
                }
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                
                console.log('📚 Excel 数据行数:', jsonData.length);
                
                // 智能识别列名
                let wordColumn = '单词';
                const firstRow = jsonData[0];
                if (firstRow) {
                    const keys = Object.keys(firstRow);
                    console.log('📚 Excel 列名:', keys);
                    // 尝试找到单词列
                    for (const key of keys) {
                        const lowerKey = key.toLowerCase();
                        if (lowerKey.includes('word') || lowerKey.includes('单词') || lowerKey.includes('词')) {
                            wordColumn = key;
                            break;
                        }
                    }
                }
                console.log('📚 单词列名:', wordColumn);
                
                // 提取单词
                const words = [];
                for (const row of jsonData) {
                    const word = row[wordColumn];
                    if (word && typeof word === 'string' && word.trim().length > 0) {
                        words.push(word.trim());
                    }
                }
                
                console.log('📚 提取的单词数量:', words.length);
                return words;
            } catch (error) {
                console.error('加载 Excel 文件失败:', error);
                return [];
            }
        }

        // ==================== 渲染文本 ====================
        function renderText() {
            const display = document.getElementById('textDisplay');
            display.innerHTML = '';
            
            // 计算当前页面的单词范围
            const startIndex = (currentPage - 1) * wordsPerPage;
            const endIndex = Math.min(startIndex + wordsPerPage, currentWords.length);
            
            // 如果有段落信息，按段落渲染
            if (window.currentParagraphs && window.currentParagraphs.length > 0) {
                // 按段落渲染，但只显示当前页面的单词
                let globalWordIndex = 0;
                
                window.currentParagraphs.forEach((paragraph, paraIndex) => {
                    const paraDiv = document.createElement('div');
                    paraDiv.style.marginBottom = '16px';
                    paraDiv.style.textIndent = '2em';
                    
                    // 提取段落中的单词
                    const wordsInPara = paragraph.match(/\b[a-zA-Z]{2,}\b/g) || [];
                    
                    wordsInPara.forEach((word) => {
                        // 检查这个单词是否在当前页面范围内
                        if (globalWordIndex >= startIndex && globalWordIndex < endIndex) {
                            const wordSpan = document.createElement('span');
                            wordSpan.className = 'word';
                            wordSpan.style.display = 'inline-block';
                            wordSpan.style.margin = '0 2px'; // 减小间距
                            wordSpan.style.padding = '2px 4px'; // 添加内边距
                            
                            if (globalWordIndex === currentWordIndex) {
                                wordSpan.classList.add('current');
                                wordSpan.style.backgroundColor = '#FFE4B5';
                                wordSpan.style.borderRadius = '4px';
                            } else if (globalWordIndex < currentWordIndex) {
                                wordSpan.classList.add('correct');
                                wordSpan.style.color = '#4CAF50';
                            }
                            
                            // 使用原始段落中的单词（保持原文大小写）
                            wordSpan.textContent = word;
                            paraDiv.appendChild(wordSpan);
                        }
                        
                        globalWordIndex++;
                    });
                    
                    display.appendChild(paraDiv);
                });
                
            } else {
                // 没有段落信息，按单词渲染
                const currentPageWords = currentWords.slice(startIndex, endIndex);
                
                currentPageWords.forEach((word, wordIdx) => {
                    const globalWordIndex = startIndex + wordIdx;
                    const wordSpan = document.createElement('span');
                    wordSpan.className = 'word';
                    wordSpan.style.display = 'inline-block';
                    wordSpan.style.margin = '0 4px';
                    
                    if (globalWordIndex === currentWordIndex) {
                        wordSpan.classList.add('current');
                        wordSpan.style.backgroundColor = '#FFE4B5';
                        wordSpan.style.padding = '2px 6px';
                        wordSpan.style.borderRadius = '4px';
                    } else if (globalWordIndex < currentWordIndex) {
                        wordSpan.classList.add('correct');
                        wordSpan.style.color = '#4CAF50';
                    }
                    
                    wordSpan.textContent = word;
                    display.appendChild(wordSpan);
                });
            }
        }

        // ==================== 输入处理 ====================
        document.getElementById('typingInput').addEventListener('input', function(e) {
            if (!isStarted) return;
            
            const input = e.target.value;
            const currentWord = currentWords[currentWordIndex];
            
            // 检查当前单词
            if (input.endsWith(' ')) {
                // 完成当前单词
                const typedWord = input.trim();
                
                if (typedWord === currentWord) {
                    // 正确
                    totalChars += currentWord.length;
                    currentWordIndex++;
                    currentCharIndex = 0;
                    e.target.value = '';
                    
                    // 检查是否完成
                    if (currentWordIndex >= currentWords.length) {
                        finishPractice();
                        return;
                    }
                } else {
                    // 错误
                    errors++;
                    errorWords.add(currentWord);
                    totalChars += typedWord.length;
                    currentWordIndex++;
                    currentCharIndex = 0;
                    e.target.value = '';
                    
                    if (currentWordIndex >= currentWords.length) {
                        finishPractice();
                        return;
                    }
                }
                
                renderText();
                updateStats();
            } else {
                // 实时字符检查
                currentCharIndex = input.length;
                updateCharacterFeedback(input, currentWord);
            }
        });

        // ==================== 字符反馈 ====================
        function updateCharacterFeedback(input, targetWord) {
            const wordSpans = document.querySelectorAll('.word');
            const currentWordSpan = wordSpans[currentWordIndex];
            if (!currentWordSpan) return;
            
            const chars = currentWordSpan.querySelectorAll('.char');
            
            chars.forEach((char, idx) => {
                char.classList.remove('correct', 'error', 'cursor');
                
                if (idx < input.length) {
                    if (input[idx] === targetWord[idx]) {
                        char.classList.add('correct');
                    } else {
                        char.classList.add('error');
                    }
                } else if (idx === input.length) {
                    char.classList.add('cursor');
                }
            });
        }

        // ==================== 统计更新 ====================
        function updateStats() {
            if (!startTime) {
                // 练习未开始，显示默认值
                document.getElementById('wpmValue').textContent = '0';
                document.getElementById('accuracyValue').textContent = '100%';
                document.getElementById('errorCountValue').textContent = '0';
                document.getElementById('timeValue').textContent = '0s';
                
                // 进度条
                const progress = (currentWordIndex / currentWords.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressText').textContent = `${currentWordIndex}/${currentWords.length} 单词完成`;
                return;
            }
            
            const now = Date.now();
            const elapsedSeconds = (now - startTime) / 1000;
            const elapsedMinutes = elapsedSeconds / 60;
            
            // WPM计算
            const wordsTyped = currentWordIndex;
            const wpm = elapsedMinutes > 0 ? Math.round(wordsTyped / elapsedMinutes) : 0;
            
            // 准确率
            const totalWords = currentWordIndex;
            const accuracy = totalWords > 0 ? Math.round(((totalWords - errors) / totalWords) * 100) : 100;
            
            // 更新显示
            document.getElementById('wpmValue').textContent = wpm;
            document.getElementById('accuracyValue').textContent = accuracy + '%';
            document.getElementById('errorCountValue').textContent = errors;
            document.getElementById('timeValue').textContent = Math.round(elapsedSeconds) + 's';
            
            // 进度条
            const progress = (currentWordIndex / currentWords.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${currentWordIndex}/${currentWords.length} 单词完成`;
        }

        // ==================== 完成练习 ====================
        async function finishPractice() {
            isStarted = false;
            
            if (!startTime) {
                // 练习未开始，使用默认值
                const wordsTyped = currentWords.length;
                const wpm = 0;
                const accuracy = 100;
                const elapsedSeconds = 0;
                
                // 更新总体统计
                practiceStats.totalSessions++;
                practiceStats.totalWords += wordsTyped;
                practiceStats.totalChars += totalChars;
                practiceStats.totalErrors += errors;
                practiceStats.bestWPM = Math.max(practiceStats.bestWPM, wpm);
                practiceStats.bestAccuracy = Math.max(practiceStats.bestAccuracy, accuracy);
                
                // 保存到数据库
                await saveSessionToDB(wpm, accuracy, elapsedSeconds, wordsTyped);
                
                // 备份到localStorage
                saveStats();
                
                // 检查成就
                await checkAchievements(wpm, accuracy);
                
                // 显示错误分析
                showErrorAnalysis();
                
                // 显示完成弹窗
                showCompletionModal(wpm, accuracy, elapsedSeconds, wordsTyped);
                
                return;
            }
            
            const endTime = Date.now();
            const elapsedSeconds = (endTime - startTime) / 1000;
            const elapsedMinutes = elapsedSeconds / 60;
            
            // 最终统计
            const wordsTyped = currentWords.length;
            const wpm = Math.round(wordsTyped / elapsedMinutes);
            const accuracy = Math.round(((wordsTyped - errors) / wordsTyped) * 100);
            
            // 更新总体统计
            practiceStats.totalSessions++;
            practiceStats.totalWords += wordsTyped;
            practiceStats.totalChars += totalChars;
            practiceStats.totalErrors += errors;
            practiceStats.bestWPM = Math.max(practiceStats.bestWPM, wpm);
            practiceStats.bestAccuracy = Math.max(practiceStats.bestAccuracy, accuracy);
            
            // 保存到数据库
            await saveSessionToDB(wpm, accuracy, elapsedSeconds, wordsTyped);
            
            // 备份到localStorage
            saveStats();
            
            // 检查成就
            await checkAchievements(wpm, accuracy);
            
            // 显示错误分析
            if (errorWords.size > 0) {
                showErrorAnalysis();
            }
            
            // 禁用输入
            document.getElementById('typingInput').disabled = true;
            document.getElementById('startBtn').textContent = '🎉 练习完成！';
            document.getElementById('startBtn').onclick = null;
            
            // 显示结果
            showResult(wpm, accuracy, elapsedSeconds);
        }

        // ==================== 保存会话到数据库 ====================
        async function saveSessionToDB(wpm, accuracy, duration, wordsTyped) {
            try {
                const sessionData = {
                    user_id: CURRENT_USER_ID,
                    mode: currentMode,
                    difficulty: currentDifficulty,
                    words_typed: wordsTyped,
                    chars_typed: totalChars,
                    errors: errors,
                    wpm: wpm,
                    accuracy: accuracy,
                    duration: Math.round(duration),
                    error_words: Array.from(errorWords)
                };

                const response = await fetch(`${API_BASE_URL}/typing/save-session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(sessionData)
                });

                const result = await response.json();
                if (result.success) {
                    console.log('练习记录已保存到数据库，会话ID:', result.data.session_id);
                }
            } catch (error) {
                console.error('保存到数据库失败:', error);
                // 数据已经保存到localStorage作为备份
            }
        }

        // ==================== 显示结果 ====================
        function showResult(wpm, accuracy, time) {
            const practiceArea = document.getElementById('practiceArea');
            practiceArea.innerHTML = `
                <div class="result-card">
                    <div class="result-title">🎉 练习完成！</div>
                    <div class="result-stats">
                        <div class="stat-card">
                            <div class="stat-value">${wpm}</div>
                            <div class="stat-label">WPM</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${accuracy}%</div>
                            <div class="stat-label">准确率</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${Math.round(time)}s</div>
                            <div class="stat-label">用时</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${errors}</div>
                            <div class="stat-label">错误</div>
                        </div>
                    </div>
                    <div style="margin-top: 20px; color: #6B5344;">
                        ${wpm >= 80 ? '🚀 打字速度优秀！' : wpm >= 50 ? '⚡ 打字速度良好！' : '💪 继续练习会更好！'}
                        ${accuracy >= 95 ? ' 准确率出色！' : accuracy >= 85 ? ' 准确率不错！' : ' 注意提高准确率！'}
                    </div>
                </div>
            `;
        }

        // ==================== 错误分析 ====================
        function showErrorAnalysis() {
            const errorAnalysis = document.getElementById('errorAnalysis');
            const errorWordsList = document.getElementById('errorWordsList');
            
            errorAnalysis.style.display = 'block';
            errorWordsList.innerHTML = '';
            
            errorWords.forEach(word => {
                const wordSpan = document.createElement('span');
                wordSpan.className = 'error-word';
                wordSpan.textContent = word;
                wordSpan.title = '点击加入生词本';
                wordSpan.onclick = (event) => addToVocabulary(word, event);
                errorWordsList.appendChild(wordSpan);
            });
        }

        // ==================== 添加到生词本 ====================
        function addToVocabulary(word, event) {
            try {
                // 读取词汇数据
                const vocabulary = JSON.parse(localStorage.getItem('vocabulary') || '[]');
                const folderStructure = JSON.parse(localStorage.getItem('folderStructure') || '{"folders":[{"id":"root","name":"我的单词本","type":"folder","parentId":null,"expanded":true}]}');
                
                // 查找默认文件夹
                let defaultFolder = folderStructure.folders.find(f => f.name === '默认' && f.type === 'folder');
                if (!defaultFolder) {
                    // 如果默认文件夹不存在，创建一个
                    defaultFolder = {
                        id: 'folder-' + Date.now(),
                        name: '默认',
                        type: 'folder',
                        parentId: 'root',
                        expanded: true
                    };
                    folderStructure.folders.push(defaultFolder);
                    localStorage.setItem('folderStructure', JSON.stringify(folderStructure));
                }
                
                // 检查是否已存在
                if (vocabulary.some(item => item.word === word && item.type === 'word')) {
                    alert(`"${word}" 已在您的词汇本中`);
                    return;
                }
                
                // 添加新词（使用正确的结构）
                vocabulary.push({
                    id: Date.now() + Math.random(),
                    word: word,
                    pronunciation: '',
                    romanization: '',
                    translation: '',
                    language: 'English',
                    source: '打字练习',
                    addedDate: new Date().toISOString(),
                    type: 'word',
                    parentId: defaultFolder.id
                });
                
                localStorage.setItem('vocabulary', JSON.stringify(vocabulary));
                alert(`✅ "${word}" 已添加到词汇本`);
                
                // 更新UI
                if (event && event.target) {
                    event.target.style.background = 'rgba(76, 175, 80, 0.2)';
                    event.target.style.borderColor = 'rgba(76, 175, 80, 0.5)';
                    event.target.style.color = '#4caf50';
                }
            } catch (e) {
                console.error('添加词汇失败:', e);
                alert('添加失败，请重试');
            }
        }

        // ==================== 成就系统 ====================
        async function checkAchievements(wpm, accuracy) {
            let newAchievements = [];
            
            // 第一次完成
            if (!achievements[0].unlocked && practiceStats.totalSessions === 1) {
                achievements[0].unlocked = true;
                newAchievements.push(achievements[0]);
            }
            
            // WPM成就
            if (!achievements[1].unlocked && wpm >= 50) {
                achievements[1].unlocked = true;
                newAchievements.push(achievements[1]);
            }
            if (!achievements[2].unlocked && wpm >= 80) {
                achievements[2].unlocked = true;
                newAchievements.push(achievements[2]);
            }
            
            // 准确率成就
            if (!achievements[3].unlocked && accuracy >= 95) {
                achievements[3].unlocked = true;
                newAchievements.push(achievements[3]);
            }
            if (!achievements[4].unlocked && accuracy >= 99) {
                achievements[4].unlocked = true;
                newAchievements.push(achievements[4]);
            }
            
            // 练习次数成就
            if (!achievements[5].unlocked && practiceStats.totalSessions >= 10) {
                achievements[5].unlocked = true;
                newAchievements.push(achievements[5]);
            }
            if (!achievements[6].unlocked && practiceStats.totalSessions >= 50) {
                achievements[6].unlocked = true;
                newAchievements.push(achievements[6]);
            }
            
            // 累计单词成就
            if (!achievements[7].unlocked && practiceStats.totalWords >= 1000) {
                achievements[7].unlocked = true;
                newAchievements.push(achievements[7]);
            }
            
            // 保存新成就到数据库
            for (const achievement of newAchievements) {
                await unlockAchievementInDB(achievement);
            }
            
            // 显示新解锁的成就
            if (newAchievements.length > 0) {
                showAchievementNotification(newAchievements);
            }
            
            // 备份到localStorage
            saveAchievements();
            renderAchievements();
        }

        // ==================== 解锁成就到数据库 ====================
        async function unlockAchievementInDB(achievement) {
            try {
                const response = await fetch(`${API_BASE_URL}/typing/unlock-achievement`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: CURRENT_USER_ID,
                        achievement_id: achievement.id,
                        achievement_name: achievement.name,
                        achievement_desc: achievement.desc
                    })
                });

                const result = await response.json();
                if (result.success) {
                    console.log('成就已解锁:', achievement.name);
                }
            } catch (error) {
                console.error('保存成就失败:', error);
            }
        }

        function renderAchievements() {
            const list = document.getElementById('achievementsList');
            list.innerHTML = '';
            
            achievements.forEach(achievement => {
                const item = document.createElement('div');
                item.className = 'achievement-item' + (achievement.unlocked ? ' unlocked' : '');
                item.innerHTML = `
                    <div class="achievement-icon">${achievement.icon}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${achievement.name}</div>
                        <div class="achievement-desc">${achievement.desc}</div>
                    </div>
                    ${achievement.unlocked ? '<div>✅</div>' : '<div style="opacity: 0.3;">🔒</div>'}
                `;
                list.appendChild(item);
            });
        }

        function showAchievementNotification(newAchievements) {
            newAchievements.forEach((achievement, index) => {
                setTimeout(() => {
                    const notification = document.createElement('div');
                    notification.style.cssText = `
                        position: fixed;
                        top: ${100 + index * 80}px;
                        right: 20px;
                        background: linear-gradient(135deg, #8B6F47 0%, #A87C5C 100%);
                        color: white;
                        padding: 20px;
                        border-radius: 12px;
                        box-shadow: 0 8px 32px rgba(139, 111, 71, 0.4);
                        z-index: 10000;
                        animation: slideIn 0.5s ease;
                        min-width: 280px;
                    `;
                    notification.innerHTML = `
                        <div style="font-size: 32px; text-align: center; margin-bottom: 8px;">${achievement.icon}</div>
                        <div style="font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 4px;">🎉 成就解锁！</div>
                        <div style="font-size: 16px; text-align: center;">${achievement.name}</div>
                        <div style="font-size: 12px; text-align: center; opacity: 0.9; margin-top: 4px;">${achievement.desc}</div>
                    `;
                    document.body.appendChild(notification);
                    
                    setTimeout(() => {
                        notification.style.animation = 'slideOut 0.5s ease';
                        setTimeout(() => notification.remove(), 500);
                    }, 3000);
                }, index * 500);
            });
        }

        // ==================== 辅助功能 ====================
        function resetPractice() {
            isStarted = false;
            currentWordIndex = 0;
            currentCharIndex = 0;
            errors = 0;
            totalChars = 0;
            errorWords.clear();
            
            document.getElementById('typingInput').disabled = true;
            document.getElementById('typingInput').value = '';
            document.getElementById('textDisplay').innerHTML = '点击"开始练习"按钮开始...';
            document.getElementById('startBtn').textContent = '▶️ 开始练习';
            document.getElementById('startBtn').onclick = startPractice;
            document.getElementById('errorAnalysis').style.display = 'none';
            
            document.getElementById('wpmValue').textContent = '0';
            document.getElementById('accuracyValue').textContent = '100%';
            document.getElementById('errorCountValue').textContent = '0';
            document.getElementById('timeValue').textContent = '0s';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '准备开始...';
        }

        function pausePractice() {
            isStarted = false;
            document.getElementById('typingInput').disabled = true;
            document.getElementById('startBtn').textContent = '▶️ 继续';
            document.getElementById('startBtn').onclick = resumePractice;
        }

        function resumePractice() {
            isStarted = true;
            document.getElementById('typingInput').disabled = false;
            document.getElementById('typingInput').focus();
            document.getElementById('startBtn').textContent = '⏸️ 暂停';
            document.getElementById('startBtn').onclick = pausePractice;
        }

        function skipCurrent() {
            if (!isStarted || currentWordIndex >= currentWords.length) return;
            
            errorWords.add(currentWords[currentWordIndex]);
            errors++;
            currentWordIndex++;
            currentCharIndex = 0;
            document.getElementById('typingInput').value = '';
            
            if (currentWordIndex >= currentWords.length) {
                finishPractice();
            } else {
                renderText();
                updateStats();
            }
        }

        // ==================== 数据持久化 ====================
        function saveStats() {
            localStorage.setItem('typingStats', JSON.stringify(practiceStats));
        }

        function loadStats() {
            const saved = localStorage.getItem('typingStats');
            if (saved) {
                practiceStats = JSON.parse(saved);
            }
        }

        function saveAchievements() {
            localStorage.setItem('typingAchievements', JSON.stringify(achievements));
        }

        function loadAchievements() {
            const saved = localStorage.getItem('typingAchievements');
            if (saved) {
                const savedAchievements = JSON.parse(saved);
                savedAchievements.forEach((saved, idx) => {
                    if (achievements[idx]) {
                        achievements[idx].unlocked = saved.unlocked;
                    }
                });
            }
        }

        // ==================== 工具函数 ====================
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // ==================== 键盘快捷键 ====================
        document.addEventListener('keydown', function(e) {
            // Esc键重置
            if (e.key === 'Escape') {
                resetPractice();
            }
            // Ctrl/Cmd + Enter 开始/暂停
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                if (!isStarted && !document.getElementById('typingInput').disabled) {
                    resumePractice();
                } else if (isStarted) {
                    pausePractice();
                } else {
                    startPractice();
                }
            }
        });

        // ==================== 动画样式 ====================
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(400px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(400px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            console.log('📱 打字练习页面已加载');
        });
    </script>
</body>
</html>
