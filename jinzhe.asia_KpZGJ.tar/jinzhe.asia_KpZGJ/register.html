<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 注册账号 - Language Hub</title>
    <link rel="stylesheet" href="unified-theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', sans-serif;
            background: linear-gradient(135deg, #f5ebe0 0%, #e3d5ca 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            background: linear-gradient(135deg, #A87C5C 0%, #8B6F47 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .register-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .register-header p {
            font-size: 15px;
            opacity: 0.9;
        }

        .register-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .register-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #a0aec0;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 14px 14px 14px 45px;
            font-size: 15px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--maillard-caramel);
            box-shadow: 0 0 0 4px rgba(168, 124, 92, 0.1);
        }

        .form-control::placeholder {
            color: #cbd5e0;
        }

        .form-control.error {
            border-color: #f56565;
        }

        .error-message {
            color: #f56565;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #f56565;
        }

        .password-strength-bar.medium {
            width: 66%;
            background: #ed8936;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #38a169;
        }

        .password-hint {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #a0aec0;
            padding: 5px;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #A87C5C;
        }

        .btn-register {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #A87C5C 0%, #8B6F47 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(168, 124, 92, 0.4);
            letter-spacing: 0.5px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 124, 92, 0.5);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #718096;
        }

        .login-link a {
            color: #A87C5C;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: #8B6F47;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: #fed7d7;
            color: #c53030;
            border-left: 4px solid #f56565;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #38a169;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #718096;
        }

        .terms input[type="checkbox"] {
            margin-top: 3px;
            cursor: pointer;
            accent-color: #A87C5C;
        }

        .terms a {
            color: #A87C5C;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .register-container {
                margin: 0;
                border-radius: 16px;
            }

            .register-header {
                padding: 30px 25px;
            }

            .register-body {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="register-icon">📚</div>
            <h1>创建账号</h1>
            <p>开启您的语言学习之旅</p>
        </div>

        <div class="register-body">
            <div id="alertBox" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名 *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input 
                            type="text" 
                            id="username" 
                            class="form-control" 
                            placeholder="请输入用户名（3-20个字符）"
                            minlength="3"
                            maxlength="20"
                            required
                        >
                    </div>
                    <div class="error-message" id="usernameError"></div>
                </div>

                <div class="form-group">
                    <label for="displayName">显示名称 *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✨</span>
                        <input 
                            type="text" 
                            id="displayName" 
                            class="form-control" 
                            placeholder="请输入显示名称"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">邮箱</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input 
                            type="email" 
                            id="email" 
                            class="form-control" 
                            placeholder="请输入邮箱（可选）"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">密码 *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            class="form-control" 
                            placeholder="请输入密码（至少6位）"
                            minlength="6"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            👁️
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrengthBar"></div>
                    </div>
                    <div class="password-hint" id="passwordHint">密码强度：未设置</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认密码 *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            class="form-control" 
                            placeholder="请再次输入密码"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            👁️
                        </button>
                    </div>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <div class="terms">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">
                        我已阅读并同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg">
                    🎉 立即注册
                </button>
            </form>

            <div class="login-link">
                已有账号？ <a href="login.html">立即登录</a>
            </div>
        </div>
    </div>

    <script src="auth-system.js"></script>
    <script>
        // 密码显示/隐藏切换
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const toggleBtn = event.target;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        // 密码强度检测
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('passwordStrengthBar');
            const hint = document.getElementById('passwordHint');
            
            let strength = 0;
            let strengthText = '弱';
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'password-strength-bar';
            
            if (strength <= 2) {
                strengthBar.classList.add('weak');
                strengthText = '弱';
            } else if (strength <= 4) {
                strengthBar.classList.add('medium');
                strengthText = '中等';
            } else {
                strengthBar.classList.add('strong');
                strengthText = '强';
            }
            
            hint.textContent = `密码强度：${strengthText}`;
        });

        // 用户名验证
        document.getElementById('username').addEventListener('blur', function(e) {
            const username = e.target.value;
            const errorEl = document.getElementById('usernameError');
            
            if (username.length < 3) {
                e.target.classList.add('error');
                errorEl.textContent = '用户名至少需要3个字符';
                errorEl.classList.add('show');
            } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                e.target.classList.add('error');
                errorEl.textContent = '用户名只能包含字母、数字和下划线';
                errorEl.classList.add('show');
            } else {
                // 检查用户名是否已存在
                const result = AuthSystem.checkUsernameExists(username);
                if (result.exists) {
                    e.target.classList.add('error');
                    errorEl.textContent = '该用户名已被使用';
                    errorEl.classList.add('show');
                } else {
                    e.target.classList.remove('error');
                    errorEl.classList.remove('show');
                }
            }
        });

        // 确认密码验证
        document.getElementById('confirmPassword').addEventListener('blur', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = e.target.value;
            const errorEl = document.getElementById('confirmPasswordError');
            
            if (confirmPassword && password !== confirmPassword) {
                e.target.classList.add('error');
                errorEl.textContent = '两次输入的密码不一致';
                errorEl.classList.add('show');
            } else {
                e.target.classList.remove('error');
                errorEl.classList.remove('show');
            }
        });

        // 表单提交处理
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const displayName = document.getElementById('displayName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            // 验证
            if (!agreeTerms) {
                showAlert('error', '请先同意服务条款和隐私政策');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('error', '两次输入的密码不一致');
                return;
            }
            
            if (password.length < 6) {
                showAlert('error', '密码至少需要6个字符');
                return;
            }
            
            // 注册
            const result = AuthSystem.register({
                username: username,
                password: password,
                displayName: displayName,
                email: email,
                role: 'student', // 新用户默认为学生角色
                avatar: '👨‍🎓'
            });
            
            if (result.success) {
                showAlert('success', '✅ 注册成功！正在跳转到登录页面...');
                
                // 2秒后跳转到登录页
                setTimeout(() => {
                    window.location.href = 'login.html?username=' + encodeURIComponent(username);
                }, 2000);
            } else {
                showAlert('error', '❌ ' + result.message);
            }
        });

        // 显示提示消息
        function showAlert(type, message) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 3000);
            }
        }

        // 检查是否已登录
        if (getCurrentUser()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
